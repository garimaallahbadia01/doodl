<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doodle</title>
    <link rel="stylesheet" href="/src/ui/styles.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@1.7.0/dist/lottie-player.js"></script>
</head>

<body>
    <div id="app">
        <div id="container">

            <!-- Sidebar column to hold tools and theme toggle -->
            <div class="sidebar-column">
                <!-- Sidebar Toolbar (Left) -->
                <div id="sidebar">
                    <!-- Group 1: Logo -->
                    <div class="sidebar-group">
                        <div class="sidebar-logo">
                            <img id="sidebarLogoImg" src="/favicon.svg" alt="Doodle" width="28" height="28">
                        </div>
                    </div>
                    <div class="sidebar-divider"></div>

                    <!-- Group 2: Core Tools -->
                    <div class="sidebar-group">
                        <button class="sidebar-btn active" id="pencilBtn" title="Draw">
                            <img src="/Tool-icons/pencil-icon.svg" alt="Draw" class="sidebar-icon">
                        </button>
                        <button class="sidebar-btn" id="eraserBtn" title="Eraser">
                            <img src="/Tool-icons/eraser-icon.svg" alt="Eraser" class="sidebar-icon">
                        </button>
                    </div>

                    <div class="sidebar-divider"></div>

                    <!-- Group 3: Brush Size -->
                    <div class="sidebar-group">
                        <div class="brush-slider-wrap">
                            <input type="range" id="brushSlider" min="1" max="20" value="3" orient="vertical"
                                title="Brush Size">
                            <div class="brush-preview-dot" id="brushPreviewDot"></div>
                        </div>
                    </div>

                    <div class="sidebar-divider"></div>

                    <!-- Group 4: Color Swatches -->
                    <div class="sidebar-group" style="padding: 10px 0; gap: 4px;">
                        <div class="swatch active" data-color="#000000" title="Black"></div>
                        <div class="swatch swatch-white" data-color="#FFFFFF" title="White"></div>
                        <div class="swatch" data-color="#FF3B30" title="Red"></div>
                        <div class="swatch" data-color="#FF9500" title="Orange"></div>
                        <div class="swatch" data-color="#34C759" title="Green"></div>
                        <div class="swatch" data-color="#007AFF" title="Blue"></div>
                        <div class="swatch" data-color="#AF52DE" title="Purple"></div>
                    </div>

                    <div class="sidebar-divider"></div>

                    <!-- Group 5: History -->
                    <div class="sidebar-group">
                        <button class="sidebar-btn" id="undoBtn" title="Undo">
                            <img src="/Tool-icons/undo-icon.svg" alt="Undo" class="sidebar-icon">
                        </button>
                        <button class="sidebar-btn" id="redoBtn" title="Redo">
                            <img src="/Tool-icons/redo-icon.svg" alt="Redo" class="sidebar-icon">
                        </button>
                    </div>

                    <div class="sidebar-divider"></div>

                    <!-- Group 6: Utilities -->
                    <div class="sidebar-group">
                        <button class="sidebar-btn" id="gridBtn" title="Grid">
                            <img src="/Tool-icons/grid-icon.svg" alt="Grid" class="sidebar-icon">
                        </button>
                        <button class="sidebar-btn" id="cameraBtn" title="Camera">
                            <img src="/Tool-icons/camera-icon.svg" alt="Camera" class="sidebar-icon">
                        </button>
                        <button class="sidebar-btn" id="clearBtn" title="Clear Canvas">
                            <img src="/Tool-icons/clear-icon.svg" alt="Clear" class="sidebar-icon">
                        </button>
                        <button class="sidebar-btn" id="exportBtn" title="Export">
                            <img src="/Tool-icons/download-icon.svg" alt="Export" class="sidebar-icon">
                        </button>
                    </div>
                </div>

                <!-- Theme Toggle (Bottom Left, under sidebar) -->
                <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle Dark Mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="feather feather-moon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>

            <!-- Drawing Canvas (Main Stage) -->
            <div id="drawingPanel">
                <canvas id="drawingCanvas" role="img" aria-label="Interactive drawing canvas"></canvas>
                <!-- Finger Cursor Layer -->
                <div id="fingerCursor" class="finger-cursor"></div>
            </div>

            <!-- Camera PIP (Bottom Right of Canvas) -->
            <div id="pipPanel">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="skeletonCanvas" role="img" aria-label="Hand tracking skeleton visualization"></canvas>
                <!-- Camera-off overlay -->
                <div id="pipCameraOff" class="pip-camera-off" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 7 16 12 23 17V7z" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                </div>
            </div>

            <!-- Toast Notification -->
            <div id="toast" class="toast"></div>

            <!-- Radial Color Picker (gesture-driven) -->
            <div id="colorPicker"></div>

            <!-- Fist Progress Ring -->
            <canvas id="fistProgress" width="48" height="48"></canvas>

            <!-- Clear Flash -->
            <div id="clearFlash"></div>
            <div id="actionFlash" class="action-flash"></div>

            <!-- Export Modal -->
            <div id="exportModal" class="export-modal-backdrop" aria-hidden="true">
                <div class="export-modal">
                    <h2 class="export-modal-title">your doodle, framed</h2>
                    <p class="export-modal-subtitle">name it, sign it, keep it</p>

                    <div class="export-preview-card">
                        <canvas id="exportPreviewCanvas"></canvas>
                        <div class="export-preview-footer">
                            <input type="text" id="exportTitle" class="export-input" placeholder="title" maxlength="60">
                            <img src="/doodle.svg" alt="Doodle" class="export-brand-logo">
                        </div>
                    </div>

                    <div class="export-modal-actions">
                        <button id="exportCloseBtn" class="export-btn export-btn-close">Close</button>
                        <button id="exportDownloadBtn" class="export-btn export-btn-download">Download</button>
                    </div>
                </div>
            </div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay">
                <lottie-player src="/Logo-2-remix.json" background="transparent" speed="1"
                    style="width: 250px; height: 100px;" loop autoplay></lottie-player>
                <span id="loadingText" class="loading-status-text">Loading hand tracking model</span>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
